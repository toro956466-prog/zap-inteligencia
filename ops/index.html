<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Zap Inteligência — Ops</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #050505;
  --surface: #0a0a0a;
  --surface-2: #0f0f0f;
  --border: #1a1a18;
  --border-hover: #2a2a25;
  --text: #fafafa;
  --text-muted: #a1a1aa;
  --text-dim: #71717a;
  --gold: #F5A623;
  --gold-dark: #FF8C00;
  --gold-glow: rgba(245, 166, 35, 0.12);
  --green: #22c55e;
  --green-dim: rgba(34, 197, 94, 0.15);
  --red: #ef4444;
  --red-dim: rgba(239, 68, 68, 0.15);
  --yellow: #eab308;
  --yellow-dim: rgba(234, 179, 8, 0.15);
  --blue: #3b82f6;
  --blue-dim: rgba(59, 130, 246, 0.15);
  --radius: 12px;
  --radius-sm: 8px;
}
body { font-family: 'Outfit', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; -webkit-font-smoothing: antialiased; }
.container { max-width: 1280px; margin: 0 auto; padding: 24px 20px 48px; }
header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.logo h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
.logo h1 span { color: var(--text-muted); font-weight: 400; }
.header-meta { display: flex; align-items: center; gap: 16px; font-size: 13px; color: var(--text-dim); }
.refresh-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

.grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: border-color 0.15s; }
.card:hover { border-color: var(--border-hover); }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.card-title { font-size: 13px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 8px; }
.card-title .icon { font-size: 15px; }
.col-4 { grid-column: span 4; }
.col-5 { grid-column: span 5; }
.col-6 { grid-column: span 6; }
.col-7 { grid-column: span 7; }
.col-8 { grid-column: span 8; }
.col-12 { grid-column: span 12; }

.status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.status-online { background: var(--green-dim); color: var(--green); }
.status-offline { background: var(--red-dim); color: var(--red); }
.status-warning { background: var(--yellow-dim); color: var(--yellow); }
.dot { width: 6px; height: 6px; border-radius: 50%; }
.dot-green { background: var(--green); }
.dot-red { background: var(--red); }
.dot-yellow { background: var(--yellow); }

.device { background: var(--surface-2); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 10px; }
.device:last-child { margin-bottom: 0; }
.device-row { display: flex; align-items: center; justify-content: space-between; }
.device-name { font-weight: 500; font-size: 14px; }
.device-detail { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
.device-detail span { margin-right: 8px; }

.stat-row { display: flex; gap: 12px; flex-wrap: wrap; }
.stat-box { flex: 1; min-width: 80px; background: var(--surface-2); border-radius: var(--radius-sm); padding: 14px 16px; text-align: center; }
.stat-value { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
.stat-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.stat-value.gold { color: var(--gold); }
.stat-value.green { color: var(--green); }
.stat-value.blue { color: var(--blue); }

.gpu-bar-container { margin-top: 10px; }
.gpu-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
.gpu-bar { height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden; }
.gpu-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-dark)); border-radius: 3px; transition: width 0.5s; }

.progress-bar { height: 4px; background: var(--surface); border-radius: 2px; overflow: hidden; margin-top: 6px; }
.progress-fill { height: 100%; border-radius: 2px; }

/* Restaurant cards */
.restaurant-card { background: var(--surface-2); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 10px; }
.restaurant-card:last-child { margin-bottom: 0; }
.restaurant-name { font-weight: 600; font-size: 14px; color: var(--text); }
.restaurant-city { font-size: 12px; color: var(--text-dim); }
.restaurant-soul { font-size: 12px; color: var(--text-muted); margin-top: 6px; font-style: italic; border-left: 2px solid var(--gold); padding-left: 8px; }
.restaurant-rules { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
.rule-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--gold-glow); color: var(--gold); font-weight: 500; }

/* Conversation list */
.convo-list { list-style: none; }
.convo-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; gap: 8px; }
.convo-item:last-child { border-bottom: none; }
.convo-restaurant { font-weight: 500; color: var(--text); }
.convo-from { color: var(--text-dim); font-size: 12px; }
.convo-preview { color: var(--text-muted); font-size: 12px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
.convo-status { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
.convo-status.active { background: var(--green-dim); color: var(--green); }
.convo-status.waiting { background: var(--yellow-dim); color: var(--yellow); }
.convo-status.closed { background: rgba(107,114,128,0.15); color: #9ca3af; }
.convo-time { color: var(--text-dim); font-size: 11px; min-width: 50px; text-align: right; }

/* Error list */
.error-list { list-style: none; }
.error-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; background: var(--surface-2); border-radius: var(--radius-sm); margin-bottom: 8px; font-size: 13px; }
.error-item:last-child { margin-bottom: 0; }
.error-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.error-msg { color: var(--text-muted); flex: 1; }
.error-time { color: var(--text-dim); font-size: 11px; white-space: nowrap; }

.empty-state { text-align: center; padding: 24px; color: var(--text-dim); font-size: 13px; }

.loading { display: flex; align-items: center; justify-content: center; min-height: 200px; color: var(--text-dim); font-size: 14px; }

@media (max-width: 768px) {
  .container { padding: 16px 12px 32px; }
  .grid { gap: 12px; }
  .col-4, .col-5, .col-6, .col-7, .col-8, .col-12 { grid-column: span 12; }
  .stat-value { font-size: 22px; }
  .convo-item { flex-wrap: wrap; gap: 4px; }
}
@media (min-width: 769px) and (max-width: 1024px) {
  .col-4 { grid-column: span 6; }
  .col-5 { grid-column: span 6; }
  .col-7 { grid-column: span 6; }
  .col-8 { grid-column: span 12; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <h1>Zap <em style="font-family:'Playfair Display',serif;font-style:italic;color:#F5A623">Inteligência</em> <span>/ ops</span></h1>
    </div>
    <div class="header-meta">
      <span><span class="refresh-dot"></span>&nbsp; Live</span>
      <span id="lastUpdated">—</span>
    </div>
  </header>
  <div id="dashboard" class="loading">Loading dashboard…</div>
</div>

<script>
const STATUS_URL = 'status.json';
const REFRESH_MS = 60000;

function timeAgo(dateStr) {
  if (!dateStr) return '—';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function formatTime(dateStr) {
  if (!dateStr) return '';
  return new Date(dateStr).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

function pct(used, total) {
  return Math.round((used / total) * 100);
}

function render(d) {
  // Phones
  const phones = Object.values(d.phones).map(p => `
    <div class="device">
      <div class="device-row">
        <span class="device-name">${p.name}</span>
        <span class="status-badge ${p.online ? 'status-online' : 'status-offline'}">
          <span class="dot ${p.online ? 'dot-green' : 'dot-red'}"></span>
          ${p.online ? 'Online' : 'Offline'}
        </span>
      </div>
      <div class="device-detail">
        <span>🔋 ${p.battery != null ? p.battery + '%' : '—'}</span>
        <span>🌡️ ${p.temperature != null ? p.temperature + '°C' : '—'}</span>
        <span>${p.whatsappRunning
          ? '<span style="color:var(--green)">WhatsApp ✓</span>'
          : '<span style="color:var(--red)">WhatsApp ✗</span>'}</span>
      </div>
      <div class="device-detail">
        <span>RAM: ${p.ramAvailable != null ? Math.round(p.ramAvailable) + ' / ' + Math.round(p.ramTotal) + ' MB' : '—'}</span>
        ${p.storage ? '<span>Storage: ' + p.storage + '</span>' : ''}
      </div>
      ${p.ramAvailable && p.ramTotal ? `
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct(p.ramTotal - p.ramAvailable, p.ramTotal)}%;background:${pct(p.ramTotal - p.ramAvailable, p.ramTotal) > 80 ? 'var(--red)' : 'var(--gold)'}"></div>
        </div>
      ` : ''}
    </div>
  `).join('');

  // PC
  const models = d.pc.models || [];
  const modelTags = models.map(m => `<span class="rule-tag" style="background:rgba(59,130,246,0.12);color:var(--blue)">${m}</span>`).join('');

  // Restaurants
  const restaurantCards = (d.restaurants.clients || []).map(r => `
    <div class="restaurant-card">
      <div class="device-row">
        <div>
          <div class="restaurant-name">${r.name}</div>
          <div class="restaurant-city">${r.city || ''}</div>
        </div>
        <span class="status-badge ${r.active ? 'status-online' : 'status-warning'}">
          <span class="dot ${r.active ? 'dot-green' : 'dot-yellow'}"></span>
          ${r.active ? 'Active' : 'Setup'}
        </span>
      </div>
      ${r.soul ? `<div class="restaurant-soul">${r.soul}</div>` : ''}
      ${r.rules && r.rules.length ? `
        <div class="restaurant-rules">
          ${r.rules.map(rule => `<span class="rule-tag">${rule}</span>`).join('')}
        </div>
      ` : ''}
    </div>
  `).join('') || '<div class="empty-state">No restaurants yet</div>';

  // Conversations
  const convos = (d.conversations || []).map(c => `
    <li class="convo-item">
      <div>
        <div class="convo-restaurant">${c.restaurant}</div>
        <div class="convo-from">${c.customer || ''}</div>
      </div>
      <div class="convo-preview">${c.lastMessage || ''}</div>
      <span class="convo-status ${c.status}">${c.status}</span>
      <span class="convo-time">${formatTime(c.time)}</span>
    </li>
  `).join('') || '<div class="empty-state">No conversations yet</div>';

  // Errors
  const errors = (d.errors || []).map(e => {
    const icon = e.severity === 'critical' ? '🔴' : e.severity === 'warning' ? '⚠️' : 'ℹ️';
    return `
      <div class="error-item">
        <span class="error-icon">${icon}</span>
        <span class="error-msg">${e.message}</span>
        <span class="error-time">${timeAgo(e.time)}</span>
      </div>
    `;
  }).join('') || '<div class="empty-state">All clear ✅</div>';

  document.getElementById('dashboard').className = 'grid';
  document.getElementById('dashboard').innerHTML = `
    <!-- Phones -->
    <div class="card col-6">
      <div class="card-header">
        <span class="card-title"><span class="icon">📱</span> Phones</span>
        <span style="font-size:12px;color:var(--text-dim)">${Object.keys(d.phones).length} devices</span>
      </div>
      ${phones}
    </div>

    <!-- PC / Server -->
    <div class="card col-6">
      <div class="card-header">
        <span class="card-title"><span class="icon">🖥️</span> Server</span>
        <span class="status-badge ${d.pc.online ? 'status-online' : 'status-offline'}">
          <span class="dot ${d.pc.online ? 'dot-green' : 'dot-red'}"></span>
          ${d.pc.online ? 'Online' : 'Offline'}
        </span>
      </div>
      <div class="device">
        <div class="device-row">
          <span class="device-name">${d.pc.gpu || 'GPU'}</span>
          <span style="font-size:12px;color:var(--text-dim)">${d.pc.ram || ''} RAM</span>
        </div>
        <div class="device-detail">
          <span>🌡️ ${d.pc.temperature || '—'}</span>
          <span>⚡ ${d.pc.powerDraw || '—'}</span>
          <span>⏱️ ${d.pc.uptime || '—'}</span>
        </div>
        ${d.pc.ollama ? `
          <div style="margin-top:10px">
            <div class="device-detail" style="color:var(--text-muted);font-weight:500">Ollama
              <span class="status-badge ${d.pc.ollama.running ? 'status-online' : 'status-offline'}" style="margin-left:6px">
                ${d.pc.ollama.running ? 'Running' : 'Down'}
              </span>
            </div>
            <div class="device-detail">VRAM: ${d.pc.ollama.vramUsed || '—'} / ${d.pc.ollama.vramTotal || '—'}</div>
            <div class="gpu-bar-container">
              <div class="gpu-label"><span>GPU</span><span>${d.pc.ollama.gpuUsage || 0}%</span></div>
              <div class="gpu-bar"><div class="gpu-bar-fill" style="width:${d.pc.ollama.gpuUsage || 0}%"></div></div>
            </div>
          </div>
        ` : ''}
      </div>
      ${models.length ? `
        <div style="margin-top:12px">
          <div class="device-detail" style="margin-bottom:6px;color:var(--text-muted);font-weight:500">Models (${models.length})</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px">${modelTags}</div>
        </div>
      ` : ''}
    </div>

    <!-- Restaurants -->
    <div class="card col-5">
      <div class="card-header">
        <span class="card-title"><span class="icon">🍽️</span> Restaurants</span>
        <span style="font-size:12px;color:var(--text-dim)">${(d.restaurants.clients || []).length} clients</span>
      </div>
      ${restaurantCards}
    </div>

    <!-- Conversations -->
    <div class="card col-7">
      <div class="card-header">
        <span class="card-title"><span class="icon">💬</span> Customer Conversations</span>
        <span style="font-size:12px;color:var(--text-dim)">${(d.conversations || []).length} active</span>
      </div>
      <ul class="convo-list">${convos}</ul>
    </div>

    <!-- Errors & Alerts -->
    <div class="card col-12">
      <div class="card-header">
        <span class="card-title"><span class="icon">⚠️</span> Errors & Alerts</span>
        <span style="font-size:12px;color:var(--text-dim)">${(d.errors || []).length} items</span>
      </div>
      <div class="error-list">${errors}</div>
    </div>
  `;

  document.getElementById('lastUpdated').textContent = 'Updated ' + timeAgo(d.lastUpdated);
}

async function load() {
  try {
    const res = await fetch(STATUS_URL + '?t=' + Date.now());
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('dashboard').innerHTML =
      '<div class="loading">⚠️ Failed to load status.json</div>';
    console.error(e);
  }
}

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
